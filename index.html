      body {
        margin: 0;

        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
      }
      #root {
        min-height: 100vh;

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f5f5f5;
      }
      .loading-content {
        text-align: center;

        padding: 40px;

      }
      .loading-content h1 {
        color: #2563eb;
        margin: 0 0 10px 0;
      }
      .loading-content p {
        color: #666;
        margin: 10px 0;
      }
      .debug-log {
        background: #1a1a1a;
        color: #00ff00;
        padding: 20px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 12px;
        max-height: 300px;
        overflow: auto;
        text-align: left;
        margin-top: 20px;
      }
      .debug-log .error {
        color: #ff6b6b;
      }
      .debug-log .warn {
        color: #fbbf24;
      }
