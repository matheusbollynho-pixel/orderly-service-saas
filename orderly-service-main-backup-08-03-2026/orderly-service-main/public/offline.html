<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandara Motos - Offline</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      color: #C1272D;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .status {
      background: rgba(193, 39, 45, 0.1);
      border: 1px solid #C1272D;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    .pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🏍️</div>
    <h1>Sem Conexão</h1>
    <p>
      Você está offline. O sistema Bandara Motos precisa de conexão com a internet 
      para funcionar corretamente.
    </p>
    <div class="status pulse">
      <p style="margin: 0;">
        ⚠️ Aguardando reconexão...
      </p>
    </div>
    <p style="margin-top: 30px; font-size: 14px;">
      Quando a conexão for restabelecida, a página será recarregada automaticamente.
    </p>
  </div>

  <script>
    // Detectar quando voltar online
    window.addEventListener('online', () => {
      console.log('✅ Conexão restabelecida');
      setTimeout(() => {
        window.location.reload();
      }, 500);
    });

    // Tentar reconectar a cada 5 segundos
    setInterval(() => {
      if (navigator.onLine) {
        console.log('✅ Online detectado, recarregando...');
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
