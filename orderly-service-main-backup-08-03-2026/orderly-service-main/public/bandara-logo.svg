<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540">
  <!-- Moto estilizada -->
  <g>
    <!-- Roda traseira -->
    <ellipse cx="240" cy="280" rx="48" ry="50" fill="none" stroke="#3d3d3d" stroke-width="10"/>
    <ellipse cx="240" cy="280" rx="30" ry="32" fill="none" stroke="#3d3d3d" stroke-width="4"/>
    
    <!-- Roda dianteira -->
    <ellipse cx="560" cy="280" rx="48" ry="50" fill="none" stroke="#3d3d3d" stroke-width="10"/>
    <ellipse cx="560" cy="280" rx="30" ry="32" fill="none" stroke="#3d3d3d" stroke-width="4"/>
    
    <!-- Chassi -->
    <path d="M 290 270 L 340 220 L 400 200 L 500 200 L 560 270" fill="none" stroke="#3d3d3d" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Linhas onduladas vermelhas superiores -->
    <path d="M 280 230 Q 310 220 340 230 Q 370 240 400 235 Q 430 230 460 240" fill="none" stroke="#b91c2e" stroke-width="9" stroke-linecap="round"/>
    <path d="M 260 250 Q 290 240 320 250 Q 350 260 380 255 Q 410 250 440 260 Q 460 265 480 260" fill="none" stroke="#b91c2e" stroke-width="9" stroke-linecap="round"/>
    
    <!-- Linha vermelha conectando ao guidão -->
    <path d="M 500 200 Q 520 185 540 180 L 570 165" fill="none" stroke="#b91c2e" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Guidão -->
    <line x1="560" y1="165" x2="600" y2="165" stroke="#3d3d3d" stroke-width="6" stroke-linecap="round"/>
    <line x1="570" y1="165" x2="575" y2="150" stroke="#3d3d3d" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Texto BANDARA em itálico/inclinado -->
  <text x="400" y="410" font-family="Arial Black, Impact, sans-serif" font-size="105" font-weight="900" text-anchor="middle" fill="#b91c2e" letter-spacing="0" transform="skewX(-8)">BANDARA</text>
  
  <!-- Linhas laterais -->
  <line x1="120" y1="465" x2="280" y2="465" stroke="#3d3d3d" stroke-width="6"/>
  <line x1="520" y1="465" x2="680" y2="465" stroke="#3d3d3d" stroke-width="6"/>
  
  <!-- Texto MOTOS -->
  <text x="400" y="485" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="#3d3d3d" letter-spacing="12">MOTOS</text>
</svg>